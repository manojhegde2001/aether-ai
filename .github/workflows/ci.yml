name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Run Linter
      run: npm run lint
      
    - name: Run Type Check
      run: npx tsc --noEmit
      
    - name: Build Project
      run: npm run build
      env:
        MONGODB_URI: mongodb://localhost:27017/aether-ai-test
        AUTH_SECRET: github-actions-test-secret-key-12345
